{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Add an expense</h1>
            <p class="auth-subtitle">Record a new transaction to your account</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">

                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input"
                           placeholder="0.00"
                           step="0.01"
                           min="0.01"
                           value="{{ amount | default('', true) }}"
                           required autofocus>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled
                            {% if not category %}selected{% endif %}>
                            Select a category
                        </option>
                        {% for cat in categories %}
                        <option value="{{ cat }}"
                            {% if cat == category %}selected{% endif %}>
                            {{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ date | default(today, true) }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="label-hint">(optional)</span></label>
                    <input type="text" id="description" name="description"
                           class="form-input"
                           placeholder="e.g. Grocery run"
                           maxlength="200"
                           value="{{ description | default('', true) }}">
                </div>

                <button type="submit" class="btn-submit">Save expense</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">← Back to Profile</a>
        </p>

    </div>
</section>

{% endblock %}
